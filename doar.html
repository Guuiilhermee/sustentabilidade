<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel do Doador | Conexão Pallet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="doacao.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .container-dash { padding: 2em; max-width: 1000px; margin: 0 auto; }
        .chart-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 2em; }
        .form-doacao { background: #fff; padding: 2em; border-radius: 8px; border-top: 5px solid #528867; }
        .form-group { margin-bottom: 1em; display: flex; flex-direction: column; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        label { font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <header class="cabecalho">
        <div class="cabecalho__logo">♻️ Conexão Pallet</div>
        <nav class="cabecalho__nav">
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="buscar.html">Buscar</a></li>
            </ul>
        </nav>
    </header>

    <main class="container-dash">
        <h1>Dashboard de Impacto (ODS 12)</h1>
        
        <div class="chart-container">
            <canvas id="meuGrafico"></canvas>
        </div>

        <section class="form-doacao">
            <h2>Cadastrar Nova Doação</h2>
            <form id="doarForm">
                <div class="form-group">
                    <label for="name">Nome da Empresa</label>
                    <input type="text" name="name" id="name" placeholder="Nome completo">
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" autocomplete="off" placeholder="exemplo@email.com">
                </div>
                <div class="form-group">
                    <label>Quantidade de Pallets:</label>
                    <input type="number" placeholder="Ex: 50" required>
                </div>
                <div class="form-group">
                    <label>Tipo de Tratamento:</label>
                    <select>
                        <option value="HT">HT (Heat Treated - Térmico)</option>
                        <option value="Outro">Outro (Apenas transporte)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Foto do Lote:</label>
                    <input type="file" accept="image/*">
                </div>
                <button type="submit">Enviar Doação</button>
            </form>
        </section>
    </main>

    <footer class="rodape">
        <p>Conexão Pallet &copy; 2026 - Fortalecendo o Ciclo de Vida dos Produtos.</p>
    </footer>

    <script>
        const ctx = document.getElementById('meuGrafico');
        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['EcoMadeiras', 'Logística Global', 'Construtora Silva', 'Super Atacado', 'Indústria ABC'],
                datasets: [{
                    label: 'Pallets Doados (Unidades)',
                    data: [150, 230, 95, 310, 180],
                    backgroundColor: '#528867',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                scales: { y: { beginAtZero: true } }
            }
        });
    </script>
</body>
</html>
